name: evalops

# The reliability gate. On every push and PR the evaluation suite runs and its
# metrics are compared against the committed baseline; the job fails if any metric
# regresses beyond tolerance. Quality is enforced here, not hoped for.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  eval-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Unit tests
        run: pytest -q

      - name: Evaluation regression gate
        run: python -m evalops eval

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evalops-report
          path: reports/
